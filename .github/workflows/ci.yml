name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cp dist/index.html ../backend/web/spa/index.html

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build backend
        run: |
          cd backend
          go build ./...
          go vet ./...
