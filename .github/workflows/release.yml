name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cp dist/index.html ../backend/web/spa/index.html

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o ../dist/videoshare-linux-amd64 .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o ../dist/videoshare-linux-arm64 .
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o ../dist/videoshare-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o ../dist/videoshare-darwin-arm64 .
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o ../dist/videoshare-windows-amd64.exe .

      - name: Create release archive
        run: |
          cd dist
          sha256sum videoshare-* > SHA256SUMS.txt
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: true
