{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}VideoShare{{end}}</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <style>
        main.container { padding-top: 2rem; }
        .video-container { max-width: 100%; margin: 1rem 0; }
        nav.breadcrumb { margin-bottom: 1.5rem; }
        .error-box { color: #d32f2f; padding: 0.5rem; margin: 1rem 0; }
        table { width: 100%; }
        .inline-form { display: inline; }
    </style>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong><a href="/">VideoShare</a></strong></li>
        </ul>
        <ul>
            {{if .IsLoggedIn}}
			<li><small>{{.Username}} ({{.UserRole}})</small></li>
			<li><a href="/admin">Admin</a></li>
			{{if eq $.UserRole "admin"}}
			<li><a href="/admin/users">Users</a></li>
			<li><a href="/admin/categories">Categories</a></li>
			<li><a href="/admin/playlists">Playlists</a></li>
			{{end}}
			<li>
                <form action="/logout" method="POST" class="inline-form" id="logout-form">
                    <button type="submit" class="outline secondary">Logout</button>
                </form>
            </li>
            <script>
            document.addEventListener('DOMContentLoaded', function() {
                VS.hijackForm('logout-form', '/api/logout', 'POST');
            });
            </script>
            {{else}}
            <li><a href="/login">Login</a></li>
            {{end}}
        </ul>
    </nav>
    <main class="container">
        {{template "content" .}}
    </main>
    <script src="/static/api.js"></script>
</body>
</html>
{{end}}
