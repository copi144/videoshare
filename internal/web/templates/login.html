{{define "title"}}Login — VideoShare{{end}}
{{define "content"}}
<article style="max-width: 500px; margin: 2rem auto;">
    <header><h1>Login</h1></header>
    {{if .Error}}
    <div class="error-box"><small>✗</small> {{.Error}}</div>
    {{end}}
    <form action="/login" method="POST" id="login-form">
        <label for="username">Username
            <input type="text" id="username" name="username" placeholder="Username" required autofocus>
        </label>
        <label for="totp_code">Authenticator Code
            <input type="text" id="totp_code" name="totp_code" placeholder="000000" required autocomplete="off" inputmode="numeric" pattern="[0-9]{6}" maxlength="6">
        </label>
        <div id="error-message" class="error-message" style="display:none;color:#d32f2f;margin-bottom:0.5rem;"></div>
        <button type="submit">Login</button>
    </form>
</article>
<script>
document.addEventListener('DOMContentLoaded', function() {
    VS.hijackForm('login-form', '/api/login', 'POST');
});
</script>
{{end}}
{{template "layout" .}}
