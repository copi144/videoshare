{{define "title"}}Enter Password — VideoShare{{end}}
{{define "content"}}
<article>
    <header><h1>Password Required</h1></header>
    <p>This video is protected. Enter the share password to continue.</p>
    {{if .Error}}
    <div class="error-box"><small>✗</small> {{.Error}}</div>
    {{end}}
    <form action="/s/{{.ResourceID}}/auth" method="POST" id="share-auth-form">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Share password" required autofocus>
        <div id="error-message" class="error-message" style="display:none;color:#d32f2f;margin-bottom:0.5rem;"></div>
        <button type="submit">Watch Video</button>
    </form>
</article>
<script>
document.addEventListener('DOMContentLoaded', function() {
    VS.hijackForm('share-auth-form', '/api/s/{{.ResourceID}}/auth', 'POST');
});
</script>
{{end}}
{{template "layout" .}}
