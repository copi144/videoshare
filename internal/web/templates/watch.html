{{define "title"}}Watch — VideoShare{{end}}
{{define "content"}}
<nav class="breadcrumb">
    <a href="/admin">← Back to Upload</a>
</nav>

<article>
    <header><h1>{{.Data.Title}}</h1></header>
    
    <div class="video-container">
        <video controls width="100%" preload="metadata" style="max-height: 70vh;">
            <source src="/api/video/{{.Data.ID}}" type="{{.Data.ContentType}}">
            Your browser does not support the video tag.
        </video>
    </div>
    
    {{if .Data.Description}}
    <p>{{.Data.Description}}</p>
    {{end}}
    
    <footer>
        <small>{{.Data.Views}} views • {{.Data.FileSize}} bytes</small>
    </footer>
</article>
{{end}}
{{template "layout" .}}
