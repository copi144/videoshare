{{define "title"}}Watch — VideoShare{{end}}
{{define "content"}}
<nav class="breadcrumb">
    <a href="/admin">← Back to Upload</a>
</nav>

<article>
    <header><h1>{{.Title}}</h1></header>
    
    <div class="video-container">
        <video controls width="100%" preload="metadata" style="max-height: 70vh;">
            <source src="/api/video/{{.ID}}" type="{{.ContentType}}">
            Your browser does not support the video tag.
        </video>
    </div>
    
    {{if .Description}}
    <p>{{.Description}}</p>
    {{end}}
    
    <footer>
        <small>{{.Views}} views • {{.FileSize}} bytes</small>
    </footer>
</article>
{{end}}
{{template "layout" .}}
